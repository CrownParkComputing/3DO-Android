name: Android CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish manually, for example v2.0.1
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew

    - name: Run unit tests
      run: ./gradlew --no-daemon test

    - name: Run lint
      run: ./gradlew --no-daemon lint

    - name: Build Debug APK
      run: ./gradlew --no-daemon assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14

    - name: Upload test and lint reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: reports-${{ github.run_number }}
        path: |
          app/build/reports/tests/
          app/build/reports/lint-results*
        retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    runs-on: ubuntu-latest
    needs: ci
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew

    - name: Build Release APK
      run: ./gradlew --no-daemon assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk-${{ env.RELEASE_TAG }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 14

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Release ${{ env.RELEASE_TAG }}
        files: app/build/outputs/apk/release/app-release.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-artifacts:
    if: ${{ always() && github.event_name != 'pull_request' && needs.ci.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs:
    - ci
    - release

    steps:
    - name: Keep newest 5 artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
            owner,
            repo,
            per_page: 100,
          });

          const activeArtifacts = artifacts
            .filter((artifact) => !artifact.expired)
            .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

          const artifactsToDelete = activeArtifacts.slice(5);

          core.info(`Found ${activeArtifacts.length} active artifacts; deleting ${artifactsToDelete.length}.`);

          for (const artifact of artifactsToDelete) {
            core.info(`Deleting artifact ${artifact.name} (${artifact.id}).`);
            await github.rest.actions.deleteArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
            });
          }

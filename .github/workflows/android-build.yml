name: Build Play Store AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      upload_to_play:
        description: 'Upload the signed AAB to Google Play'
        required: true
        default: false
        type: boolean
      play_track:
        description: 'Play Store track to publish to'
        required: false
        default: 'internal'
        type: choice
        options: [ internal, alpha, beta, production ]
      play_status:
        description: 'Google Play release status'
        required: false
        default: 'draft'
        type: choice
        options: [ draft, completed ]

permissions:
  contents: read

# Run JavaScript actions on Node.js 24 (Node 20 is deprecated on GH runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: play-store-aab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew

    - name: Check signing secrets
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        missing=0
        for secret_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
          if [ -z "${!secret_name}" ]; then
            echo "::error::Missing required GitHub secret: ${secret_name}"
            missing=1
          fi
        done
        exit "$missing"

    - name: Decode signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
      run: |
        printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        test -s "$KEYSTORE_PATH"

    - name: Build signed AAB
      run: ./gradlew --no-daemon bundleRelease
      env:
        KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: 3do-opera-signed-play-store-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
        retention-days: 7

    - name: Upload R8 deobfuscation mapping
      uses: actions/upload-artifact@v4
      with:
        name: 3do-opera-mapping
        path: app/build/outputs/mapping/release/mapping.txt
        if-no-files-found: warn
        retention-days: 7

    - name: Remove signing keystore
      if: always()
      run: rm -f "${{ runner.temp }}/release.keystore"

    - name: Check Play Store credentials
      id: play_check
      if: github.event_name == 'workflow_dispatch' && inputs.upload_to_play
      env:
        PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      run: |
        if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "::error::Missing required GitHub secret: PLAY_SERVICE_ACCOUNT_JSON"
          echo "available=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Upload AAB to Google Play
      if: github.event_name == 'workflow_dispatch' && inputs.upload_to_play && steps.play_check.outputs.available == 'true'
      uses: r0adkll/upload-google-play@v1.1.3
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.fourdo.android
        releaseFiles: app/build/outputs/bundle/release/app-release.aab
        track: ${{ inputs.play_track }}
        status: ${{ inputs.play_status }}

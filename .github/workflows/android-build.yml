name: Play Store AAB

# Builds the signed release App Bundle (.aab) and uploads it to Google Play.
# No debug/release APKs and no GitHub Releases are produced any more — the AAB
# for the Play Store is the only build artifact.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      play_track:
        description: 'Play Store track to publish to'
        required: false
        default: 'internal'
        type: choice
        options: [ internal, alpha, beta, production ]

permissions:
  contents: read

jobs:
  playstore-aab:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew

    - name: Materialize release keystore
      run: printf '%s' '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > release.keystore

    - name: Build release AAB
      run: ./gradlew --no-daemon bundleRelease
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || '4do-key' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Remove release keystore
      if: always()
      run: rm -f release.keystore

    # Upload to Google Play. Requires the PLAY_SERVICE_ACCOUNT_JSON secret
    # (a Google Play service-account JSON key with "Release manager" rights).
    - name: Check Play Store credentials
      id: play_check
      run: |
        if [ -n "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::PLAY_SERVICE_ACCOUNT_JSON secret not set — skipping Play upload (AAB was still built)."
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload AAB to Google Play
      if: steps.play_check.outputs.available == 'true'
      uses: r0adkll/upload-google-play@v1.1.3
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.fourdo.android
        releaseFiles: app/build/outputs/bundle/release/app-release.aab
        track: ${{ github.event.inputs.play_track || 'internal' }}
        status: completed

  # Keep the Actions tab tidy: retain only the 5 most recent runs of this
  # workflow and delete every build artifact (the AAB lives on Play, not here).
  cleanup:
    needs: playstore-aab
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Prune runs (keep last 5) and delete all artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;

          // 1. Delete ALL artifacts across the repo.
          const artifacts = await github.paginate(
            github.rest.actions.listArtifactsForRepo, { owner, repo, per_page: 100 });
          core.info(`Deleting ${artifacts.length} artifact(s).`);
          for (const a of artifacts) {
            await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id })
              .catch(e => core.warning(`artifact ${a.id}: ${e.message}`));
          }

          // 2. Keep only the 5 newest runs of THIS workflow; delete the rest.
          const { data: thisRun } = await github.rest.actions.getWorkflowRun({
            owner, repo, run_id: context.runId });
          const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
            owner, repo, workflow_id: thisRun.workflow_id, per_page: 100 });
          const stale = runs
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
            .slice(5);
          core.info(`Found ${runs.length} runs; deleting ${stale.length}.`);
          for (const r of stale) {
            await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: r.id })
              .catch(e => core.warning(`run ${r.id}: ${e.message}`));
          }
